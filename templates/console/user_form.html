{% extends "base.html" %}
{% block title %}تعديل مستخدم{% endblock %}
{% block content %}
<div class="card">
  <h1>تعديل: {{ target_user.email }}</h1>
  <form method="post" class="console-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">حفظ</button>
    <a class="btn btn-ghost" href="{% url 'console_user_list' %}">إلغاء</a>
  </form>
</div>
{% endblock %}
