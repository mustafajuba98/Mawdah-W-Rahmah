{% extends "base.html" %}
{% block title %}طلب رؤية{% endblock %}
{% block content %}
<div class="card">
  <h1>طلب رؤية شرعية</h1>
  <p>إلى: {{ recipient.applicant_profile.full_name|slice:":1" }}***</p>
  <form method="post">
    {% csrf_token %}
    <label>رسالة مختصرة (اختياري)
      <textarea name="message" rows="4" maxlength="2000"></textarea>
    </label>
    <button type="submit">إرسال الطلب</button>
    <a class="btn btn-secondary" href="{% url 'browse' %}">إلغاء</a>
  </form>
</div>
{% endblock %}
