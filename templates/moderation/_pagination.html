{% if page_obj.paginator.num_pages > 1 %}
<nav class="pagination-bar mod-pagination" aria-label="ترقيم الصفحات">
  {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}">السابق</a>
  {% endif %}
  <span>صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }} ({{ page_obj.paginator.count }} عنصر)</span>
  {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}">التالي</a>
  {% endif %}
</nav>
{% endif %}
