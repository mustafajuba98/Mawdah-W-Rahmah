{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>قرار المشرف — طلب رؤية</h1>
  <p>من {{ intro.requester.email }} إلى {{ intro.recipient.email }}</p>
  <form method="post">
    {% csrf_token %}
    <label>ملاحظات<textarea name="notes" rows="3"></textarea></label>
    <button type="submit" name="decision" value="approve">موافقة وفتح التواصل</button>
    <button type="submit" name="decision" value="reject" class="btn-secondary">رفض</button>
  </form>
</div>
{% endblock %}
